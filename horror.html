<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="description" content="A first-person 3D horror maze game built with Three.js. Survive the Corridors.">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Corridors</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            font-family: 'Courier New', Courier, monospace;
            user-select: none;
        }

        #game-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            filter: contrast(1.2) brightness(0.8);
            transition: filter 0.2s ease;
        }

        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        /* HUD Elements */
        #hud-top {
            padding: 20px;
            display: flex;
            justify-content: space-between;
            color: #d00;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 2px 2px 0 #000;
        }

        #health-display {
            color: #ff0000;
        }

        #level-display {
            color: #aaaaaa;
        }

        /* Center Messages */
        #message-area {
            position: absolute;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: #fff;
            z-index: 10;
        }

        h1 {
            font-size: 48px;
            margin: 0;
            color: #d00;
            text-transform: uppercase;
            letter-spacing: 5px;
            animation: pulse 2s infinite;
        }

        p.subtext {
            color: #888;
            font-size: 18px;
        }

        #suicide-prompt {
            display: none;
            color: #ff0000;
            font-size: 32px;
            font-weight: bold;
            text-shadow: 0 0 10px #ff0000;
            animation: shake 0.5s infinite;
        }

        /* Pause Menu */
        #pause-menu {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            z-index: 50;
            pointer-events: all;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #fff;
        }

        #pause-menu h2 {
            font-size: 36px;
            color: #d00;
            margin-bottom: 30px;
        }

        .control-group {
            margin: 20px;
            text-align: center;
        }

        input[type=range] {
            width: 200px;
            accent-color: #d00;
        }

        /* Weapon */
        #weapon-container {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 400px;
            height: 300px;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect x="40" y="50" width="20" height="60" fill="%23222" /><rect x="42" y="50" width="16" height="60" fill="%23444" /><circle cx="50" cy="50" r="8" fill="%23111" /><rect x="45" y="20" width="10" height="30" fill="%23000" /></svg>');
            background-repeat: no-repeat;
            background-position: center bottom;
            background-size: contain;
            transition: transform 0.1s;
        }

        .shooting {
            animation: recoil 0.2s ease-out;
        }

        .self-aim {
            transition: transform 1s ease-in-out !important;
            transform: translateX(-50%) rotate(180deg) translateY(100px) !important;
        }

        /* Crosshair */
        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 10px;
            height: 10px;
            background-color: rgba(0, 255, 0, 0.5);
            transform: translate(-50%, -50%);
            border-radius: 50%;
            border: 2px solid rgba(0, 0, 0, 0.5);
        }

        /* Damage Overlay */
        #damage-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, transparent 50%, rgba(255, 0, 0, 0.0) 100%);
            pointer-events: none;
            mix-blend-mode: multiply;
            transition: background 0.2s;
        }

        /* Start Screen */
        #start-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 20;
        }

        button {
            padding: 15px 30px;
            font-size: 24px;
            background: #333;
            color: #fff;
            border: 2px solid #d00;
            cursor: pointer;
            font-family: 'Courier New', Courier, monospace;
            text-transform: uppercase;
        }

        button:hover {
            background: #d00;
            color: #000;
        }

        /* Animations */
        @keyframes recoil {
            0% { transform: translateX(-50%) translateY(0); }
            20% { transform: translateX(-50%) translateY(40px) scale(1.1); }
            100% { transform: translateX(-50%) translateY(0); }
        }

        @keyframes pulse {
            0% { opacity: 0.8; }
            50% { opacity: 1; text-shadow: 0 0 20px #d00; }
            100% { opacity: 0.8; }
        }

        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            10% { transform: translate(-1px, -2px) rotate(-1deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            30% { transform: translate(3px, 2px) rotate(0deg); }
            40% { transform: translate(1px, -1px) rotate(1deg); }
            50% { transform: translate(-1px, 2px) rotate(-1deg); }
            60% { transform: translate(-3px, 1px) rotate(0deg); }
            70% { transform: translate(3px, 1px) rotate(-1deg); }
            80% { transform: translate(-1px, -1px) rotate(1deg); }
            90% { transform: translate(1px, 2px) rotate(0deg); }
            100% { transform: translate(1px, -2px) rotate(-1deg); }
        }

        /* Blackout for Game Over */
        #blackout {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            opacity: 0;
            pointer-events: none;
            z-index: 100;
            transition: opacity 2s;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #d00;
            font-size: 40px;
        }

        #muzzle-flash {
            position: absolute;
            bottom: 150px;
            left: 50%;
            transform: translateX(-50%);
            width: 100px;
            height: 100px;
            background: radial-gradient(circle, #fff, #ffaa00, transparent);
            opacity: 0;
            border-radius: 50%;
            pointer-events: none;
        }
    </style>
    <!-- Three.js CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <!-- 3D Canvas Container -->
    <div id="game-container"></div>

    <!-- UI Overlay -->
    <div id="ui-layer">
        <div id="damage-overlay"></div>

        <div id="hud-top">
            <div id="health-display">HEALTH: 100%</div>
            <div id="level-display">DEPTH: 1</div>
        </div>

        <div id="message-area">
            <div id="suicide-prompt">PRESS X TO END IT</div>
        </div>

        <div id="crosshair"></div>
        <div id="muzzle-flash"></div>
        <div id="weapon-container"></div>
    </div>

    <!-- Pause Menu -->
    <div id="pause-menu">
        <h2>PAUSED</h2>
        <div class="control-group">
            <label for="sensitivity-slider">Mouse Sensitivity</label><br><br>
            <input type="range" id="sensitivity-slider" min="1" max="20" value="3">
        </div>
        <button id="resume-btn">RESUME</button>
    </div>

    <!-- Start Screen -->
    <div id="start-screen">
        <h1>THE CORRIDORS</h1>
        <p class="subtext">There is no exit. Only deeper.</p>
        <br>
        <p style="color: #666; max-width: 500px; text-align: center;">WASD to Move. Mouse to Look. Click to Shoot.<br>Warning: Psychological distortion increases as health decreases.</p>
        <br>
        <button id="start-btn">ENTER</button>
    </div>

    <!-- Game Over Screen (Hidden initially) -->
    <div id="blackout">
        <div id="final-text"></div>
    </div>

    <script>
        /** * GAME STATE
         */
        let camera, scene, renderer, controls;
        let moveForward = false, moveBackward = false, moveLeft = false, moveRight = false;
        let prevTime = performance.now();
        let velocity = new THREE.Vector3();
        let direction = new THREE.Vector3();

        let walls = [];
        let enemies = [];
        let particles = [];
        let mazeSize = 15;
        let cellSize = 20;
        let currentMap = []; // Global map for collision
        let level = 1;
        let health = 100;
        let isDead = false;
        let isEnding = false; // The suicide sequence
        let canShoot = true;
        let isPaused = false;
        let distortionLevel = 0;
        let mouseSensitivity = 0.003;

        // Raycaster for shooting
        const raycaster = new THREE.Raycaster();

        // Audio Context (Synthesized sounds)
        let audioCtx;

        const container = document.getElementById('game-container');
        const healthDisplay = document.getElementById('health-display');
        const levelDisplay = document.getElementById('level-display');
        const suicidePrompt = document.getElementById('suicide-prompt');
        const damageOverlay = document.getElementById('damage-overlay');
        const weaponEl = document.getElementById('weapon-container');
        const muzzleFlashEl = document.getElementById('muzzle-flash');
        const blackoutEl = document.getElementById('blackout');
        const finalText = document.getElementById('final-text');
        const pauseMenu = document.getElementById('pause-menu');
        const sensSlider = document.getElementById('sensitivity-slider');

        /**
         * SETUP & INIT
         */
        function init() {
            // Scene
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x050505);
            scene.fog = new THREE.FogExp2(0x000000, 0.015);

            // Camera
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);

            // FIX: Rotation order YXZ prevents the "rolling" effect when looking up/down
            camera.rotation.order = 'YXZ';

            // Light
            const light = new THREE.PointLight(0xffffff, 1.5, 80);
            camera.add(light); // Torch follows player
            scene.add(camera);

            const ambient = new THREE.AmbientLight(0x404040);
            scene.add(ambient);

            // Renderer
            renderer = new THREE.WebGLRenderer({ antialias: false });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); // Keep it gritty
            container.appendChild(renderer.domElement);

            // Controls
            setupControls();

            // Generate Level 1
            generateLevel();

            // Window Resize
            window.addEventListener('resize', onWindowResize);

            // Animation Loop
            animate();
        }

        function setupControls() {
            // Pointer Lock Change Handler (Pause Logic)
            document.addEventListener('pointerlockchange', () => {
                if (document.pointerLockElement === document.body) {
                    isPaused = false;
                    pauseMenu.style.display = 'none';
                    prevTime = performance.now();
                } else {
                    if (!isDead && !isEnding && document.getElementById('start-screen').style.display === 'none') {
                        isPaused = true;
                        pauseMenu.style.display = 'flex';
                    }
                }
            });

            // Sensitivity Slider
            sensSlider.addEventListener('input', (e) => {
                mouseSensitivity = e.target.value / 1000;
            });

            // Resume Button
            document.getElementById('resume-btn').addEventListener('click', () => {
                document.body.requestPointerLock();
            });

            const onKeyDown = function(event) {
                switch (event.code) {
                    case 'ArrowUp': case 'KeyW': moveForward = true; break;
                    case 'ArrowLeft': case 'KeyA': moveLeft = true; break;
                    case 'ArrowDown': case 'KeyS': moveBackward = true; break;
                    case 'ArrowRight': case 'KeyD': moveRight = true; break;
                    case 'KeyX':
                        if (health < 10 && !isEnding && !isDead) {
                            triggerEnding();
                        }
                        break;
                }
            };

            const onKeyUp = function(event) {
                switch (event.code) {
                    case 'ArrowUp': case 'KeyW': moveForward = false; break;
                    case 'ArrowLeft': case 'KeyA': moveLeft = false; break;
                    case 'ArrowDown': case 'KeyS': moveBackward = false; break;
                    case 'ArrowRight': case 'KeyD': moveRight = false; break;
                }
            };

            document.addEventListener('keydown', onKeyDown);
            document.addEventListener('keyup', onKeyUp);
            document.addEventListener('mousedown', shoot);

            // Mouse Look
            document.body.requestPointerLock = document.body.requestPointerLock || document.body.mozRequestPointerLock;
            document.addEventListener('mousemove', (event) => {
                if (document.pointerLockElement === document.body && !isDead && !isEnding && !isPaused) {
                    camera.rotation.y -= event.movementX * mouseSensitivity;
                    camera.rotation.x -= event.movementY * mouseSensitivity;
                    // Clamp looking up/down
                    camera.rotation.x = Math.max(-Math.PI / 2, Math.min(Math.PI / 2, camera.rotation.x));
                }
            });
        }

        document.getElementById('start-btn').addEventListener('click', () => {
            document.getElementById('start-screen').style.display = 'none';
            document.body.requestPointerLock();

            // Init Audio Context on user gesture
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();

            init();
        });

        /**
         * LEVEL GENERATION (Recursive Backtracker Maze)
         */
        function generateLevel() {
            // Clean up old level
            walls.forEach(w => scene.remove(w));
            enemies.forEach(e => scene.remove(e.mesh));
            walls = [];
            enemies = [];

            // Maze grid: 1 = Wall, 0 = Empty
            // Initialize with walls
            currentMap = [];
            for (let y = 0; y < mazeSize; y++) {
                currentMap[y] = [];
                for (let x = 0; x < mazeSize; x++) {
                    currentMap[y][x] = 1;
                }
            }

            // Recursive Backtracker
            const stack = [];
            const start = {x: 1, y: 1};
            currentMap[start.y][start.x] = 0;
            stack.push(start);

            while (stack.length > 0) {
                const current = stack[stack.length - 1];
                const neighbors = [];

                const directions = [
                    {x: 0, y: -2}, {x: 0, y: 2},
                    {x: -2, y: 0}, {x: 2, y: 0}
                ];

                directions.forEach(dir => {
                    const nx = current.x + dir.x;
                    const ny = current.y + dir.y;
                    if (nx > 0 && nx < mazeSize - 1 && ny > 0 && ny < mazeSize - 1 && currentMap[ny][nx] === 1) {
                        neighbors.push({x: nx, y: ny, dx: dir.x / 2, dy: dir.y / 2});
                    }
                });

                if (neighbors.length > 0) {
                    const next = neighbors[Math.floor(Math.random() * neighbors.length)];
                    currentMap[next.y][next.x] = 0;
                    currentMap[current.y + next.dy][current.x + next.dx] = 0;
                    stack.push({x: next.x, y: next.y});
                } else {
                    stack.pop();
                }
            }

            // Textures
            const wallTexture = createNoiseTexture('grey');
            const floorTexture = createNoiseTexture('dark');

            const wallGeo = new THREE.BoxGeometry(cellSize, cellSize * 1.5, cellSize);
            const wallMat = new THREE.MeshStandardMaterial({ map: wallTexture, roughness: 0.9 });
            const floorGeo = new THREE.PlaneGeometry(mazeSize * cellSize, mazeSize * cellSize);
            const floorMat = new THREE.MeshStandardMaterial({ map: floorTexture, roughness: 1, side: THREE.DoubleSide });

            // Floor
            const floor = new THREE.Mesh(floorGeo, floorMat);
            floor.rotation.x = -Math.PI / 2;
            floor.position.set((mazeSize * cellSize)/2 - cellSize/2, -cellSize/2, (mazeSize * cellSize)/2 - cellSize/2);
            scene.add(floor);
            walls.push(floor);

            // Ceiling
            const ceil = new THREE.Mesh(floorGeo, floorMat);
            ceil.rotation.x = Math.PI / 2;
            ceil.position.set((mazeSize * cellSize)/2 - cellSize/2, cellSize, (mazeSize * cellSize)/2 - cellSize/2);
            scene.add(ceil);
            walls.push(ceil);

            // Build Walls
            for (let y = 0; y < mazeSize; y++) {
                for (let x = 0; x < mazeSize; x++) {
                    if (currentMap[y][x] === 1) {
                        const wall = new THREE.Mesh(wallGeo, wallMat);
                        wall.position.set(x * cellSize, cellSize/4, y * cellSize);
                        scene.add(wall);
                        walls.push(wall);
                    } else {
                        // Chance to spawn enemy in empty space (not at start)
                        // Scaling: Spawn rate increases with level
                        const spawnChance = Math.min(0.5, 0.12 + (level * 0.03));
                        if (Math.random() < spawnChance && (x > 3 || y > 3)) {
                            spawnEnemy(x * cellSize, y * cellSize);
                        }
                    }
                }
            }

            // Place Exit (Green Portal)
            const exitGeo = new THREE.BoxGeometry(cellSize/2, cellSize, cellSize/2);
            const exitMat = new THREE.MeshBasicMaterial({ color: 0x00ff00, wireframe: true });
            const exit = new THREE.Mesh(exitGeo, exitMat);

            // Find a far empty spot
            let ex = mazeSize - 2;
            let ey = mazeSize - 2;
            while(currentMap[ey][ex] === 1) { ey--; }

            exit.position.set(ex * cellSize, 0, ey * cellSize);
            exit.userData = { isExit: true };

            // Navigation Beacon
            const exitBeacon = new THREE.PointLight(0x00ff00, 2.5, 60);
            exitBeacon.position.set(0, 5, 0);
            exit.add(exitBeacon);

            scene.add(exit);
            walls.push(exit);

            // Player Start
            camera.position.set(cellSize, 0, cellSize);
            camera.rotation.set(0, 0, 0);

            // Update UI
            levelDisplay.innerText = "DEPTH: " + level;
            playSound(100, 'square', 0.5); // Start sound
        }

        // Procedural Texture Generator
        function createNoiseTexture(type) {
            const canvas = document.createElement('canvas');
            canvas.width = 64;
            canvas.height = 64;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = type === 'grey' ? '#444' : '#111';
            ctx.fillRect(0, 0, 64, 64);

            for (let i = 0; i < 500; i++) {
                ctx.fillStyle = `rgba(${Math.random()*255},${Math.random()*255},${Math.random()*255},0.1)`;
                if(type === 'grey') ctx.fillStyle = Math.random() > 0.5 ? '#555' : '#333';
                ctx.fillRect(Math.random()*64, Math.random()*64, 2, 2);
            }

            const tex = new THREE.CanvasTexture(canvas);
            tex.magFilter = THREE.NearestFilter;
            return tex;
        }

        /**
         * ENEMIES
         */
        function spawnEnemy(x, z) {
            // FIX: Scary "Shadow Wraith" texture
            const canvas = document.createElement('canvas');
            canvas.width = 128;
            canvas.height = 128;
            const ctx = canvas.getContext('2d');

            // Background (Transparent)
            ctx.fillStyle = 'transparent';
            ctx.fillRect(0,0,128,128);

            // Distorted Body/Head
            ctx.fillStyle = '#000';
            ctx.shadowBlur = 15;
            ctx.shadowColor = '#000';
            ctx.beginPath();
            ctx.ellipse(64, 64, 30, 50, 0, 0, Math.PI*2);
            ctx.fill();

            // Eyes (Hollow White/Red)
            ctx.fillStyle = '#fff';
            ctx.shadowBlur = 5;
            ctx.shadowColor = '#f00';

            // Left Eye (Jagged)
            ctx.beginPath();
            ctx.moveTo(45, 55);
            ctx.lineTo(55, 50);
            ctx.lineTo(50, 65);
            ctx.fill();

            // Right Eye (Jagged)
            ctx.beginPath();
            ctx.moveTo(73, 50);
            ctx.lineTo(83, 55);
            ctx.lineTo(78, 65);
            ctx.fill();

            // Screaming Mouth
            ctx.strokeStyle = '#222';
            ctx.fillStyle = '#100';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.ellipse(64, 90, 10, 20, 0, 0, Math.PI*2);
            ctx.fill();
            ctx.stroke();

            const tex = new THREE.CanvasTexture(canvas);
            const mat = new THREE.SpriteMaterial({ map: tex });
            const sprite = new THREE.Sprite(mat);

            // Make them taller and more imposing
            sprite.scale.set(12, 16, 1);
            sprite.position.set(x, 2, z); // Floating slightly

            scene.add(sprite);
            // Scaling: Speed increases with level
            enemies.push({ mesh: sprite, active: true, speed: 0.05 + (level * 0.025) });
        }

        /**
         * GAME LOGIC
         */
        function shoot() {
            if (isDead || isEnding || !canShoot || isPaused || !document.pointerLockElement) return;

            canShoot = false;

            // Visuals
            weaponEl.classList.add('shooting');
            muzzleFlashEl.style.opacity = 1;
            setTimeout(() => {
                weaponEl.classList.remove('shooting');
                muzzleFlashEl.style.opacity = 0;
                canShoot = true;
            }, 250);

            // Sound
            playSound(150, 'sawtooth', 0.1);
            setTimeout(() => playSound(100, 'square', 0.1), 100);

            // Logic
            raycaster.setFromCamera(new THREE.Vector2(0, 0), camera);
            const intersects = raycaster.intersectObjects(enemies.map(e => e.mesh));

            if (intersects.length > 0) {
                const hitObj = intersects[0].object;
                const enemyData = enemies.find(e => e.mesh === hitObj);

                if (enemyData && intersects[0].distance < 50) {
                    // Kill Enemy
                    scene.remove(hitObj);
                    enemyData.active = false;
                    playSound(300, 'sawtooth', 0.1); // Hit sound
                }
            }
        }

        function takeDamage() {
            health -= 5;
            if (health < 0) health = 0;
            updateHealthUI();

            // Red Flash
            damageOverlay.style.background = `radial-gradient(circle, transparent 20%, rgba(255, 0, 0, 0.6) 100%)`;
            setTimeout(() => {
                const opacity = (100 - health) / 100 * 0.5;
                damageOverlay.style.background = `radial-gradient(circle, transparent 50%, rgba(255, 0, 0, ${opacity}) 100%)`;
            }, 200);

            playSound(50, 'sawtooth', 0.5); // Pain sound
        }

        function updateHealthUI() {
            healthDisplay.innerText = `HEALTH: ${health}%`;

            // Warp Logic
            distortionLevel = (100 - health) / 100; // 0 to 1

            // CSS Filters on Game Container
            const hue = distortionLevel * 60; // Shift red/purple
            const blur = distortionLevel * 2;
            const contrast = 1.2 + distortionLevel;
            const saturate = 1 - (distortionLevel * 0.8); // Desaturate

            container.style.filter = `hue-rotate(${hue}deg) blur(${blur}px) contrast(${contrast}) saturate(${saturate})`;

            // ThreeJS Distortion
            camera.fov = 75 + (distortionLevel * 40); // Fisheye
            camera.updateProjectionMatrix();

            // Suicide Prompt
            if (health < 10) {
                suicidePrompt.style.display = "block";
                healthDisplay.style.color = "#500";
            }
        }

        function triggerEnding() {
            isEnding = true;
            suicidePrompt.style.display = "none";

            // 1. Animate Weapon pointing at self
            weaponEl.classList.add('self-aim');

            // 2. Delay then bang
            setTimeout(() => {
                playSound(50, 'sawtooth', 1.0); // Loud bang

                // 3. Fade to black
                blackoutEl.style.opacity = 1;
                blackoutEl.style.pointerEvents = 'all';
                finalText.innerText = "YOU LOSE";

                // 4. Stop rendering/logic effectively
                document.exitPointerLock();

            }, 1000);
        }

        // Sound Synth
        function playSound(freq, type, duration) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(freq * 0.1, audioCtx.currentTime + duration);
            gain.gain.setValueAtTime(0.5, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        // Collision Helper
        function checkCollision(pos) {
            // Get grid coordinates
            // Add a small buffer for player radius (approx 2 units)
            const buffer = 3;
            const corners = [
                {x: pos.x + buffer, z: pos.z + buffer},
                {x: pos.x - buffer, z: pos.z + buffer},
                {x: pos.x + buffer, z: pos.z - buffer},
                {x: pos.x - buffer, z: pos.z - buffer}
            ];

            for (let point of corners) {
                // FIX: Offset by half cell size because Three.js positions are centered
                const gx = Math.round(point.x / cellSize);
                const gz = Math.round(point.z / cellSize);

                // Check bounds
                if (gx < 0 || gx >= mazeSize || gz < 0 || gz >= mazeSize) return true;

                // Check wall
                if (currentMap[gz][gx] === 1) return true;
            }
            return false;
        }

        function animate() {
            if (isEnding || isPaused) {
                if(!isPaused) renderer.render(scene, camera);
                requestAnimationFrame(animate);
                return;
            }

            requestAnimationFrame(animate);

            const time = performance.now();
            const delta = (time - prevTime) / 1000;
            prevTime = time;

            // Physics / Movement
            velocity.x -= velocity.x * 10.0 * delta;
            velocity.z -= velocity.z * 10.0 * delta;

            direction.z = Number(moveForward) - Number(moveBackward);
            direction.x = Number(moveRight) - Number(moveLeft);
            direction.normalize();

            // Movement Physics Loop
            if (moveForward || moveBackward) velocity.z -= direction.z * 400.0 * delta;
            if (moveLeft || moveRight) velocity.x -= direction.x * 400.0 * delta;

            // FIX: Manual Vector Math for FPS Movement (No "Flying")
            const forwardSpeed = -velocity.z * delta; // Z is forward
            const sideSpeed = velocity.x * delta;   // X is side

            // Get rotation Y (Yaw)
            const yaw = camera.rotation.y;

            // Calculate change in X and Z based on Yaw
            // x = forward * sin(yaw) + side * cos(yaw)
            // z = forward * cos(yaw) - side * sin(yaw)
            const dx = (forwardSpeed * Math.sin(yaw)) + (sideSpeed * Math.cos(yaw));
            const dz = (forwardSpeed * Math.cos(yaw)) - (sideSpeed * Math.sin(yaw));

            // X Movement with Collision
            const oldPos = camera.position.clone();
            camera.position.x -= dx; // ThreeJS coordinate system adjustment
            if (checkCollision(camera.position)) {
                camera.position.x = oldPos.x;
            }

            // Z Movement with Collision
            const oldPos2 = camera.position.clone();
            camera.position.z -= dz;
            if (checkCollision(camera.position)) {
                camera.position.z = oldPos2.z;
            }

            // Enemy Logic
            enemies.forEach(enemy => {
                if (!enemy.active) return;

                // Vibrate effect for horror
                enemy.mesh.position.y = 2 + Math.sin(time * 0.02) * 0.5;
                enemy.mesh.material.rotation = Math.sin(time * 0.05) * 0.1;

                // Move towards player
                const dx = camera.position.x - enemy.mesh.position.x;
                const dz = camera.position.z - enemy.mesh.position.z;
                const dist = Math.sqrt(dx*dx + dz*dz);

                if (dist > 1) {
                    enemy.mesh.position.x += (dx / dist) * enemy.speed;
                    enemy.mesh.position.z += (dz / dist) * enemy.speed;
                }

                // Damage Logic
                if (dist < 3) {
                    takeDamage();
                    // Push enemy back slightly
                    enemy.mesh.position.x -= (dx / dist) * 5;
                    enemy.mesh.position.z -= (dz / dist) * 5;
                }
            });

            // Camera Shake based on distortion (Health)
            if (distortionLevel > 0) {
                const shakeIntensity = distortionLevel * 0.1;
                // Add jitter to rotation to simulate panic
                camera.rotation.z = (Math.cos(time * 0.005) * shakeIntensity) + (Math.random() * 0.01 * distortionLevel);
            } else {
                camera.rotation.z = 0;
            }

            // Check Exit
            walls.forEach(w => {
                if (w.userData.isExit) {
                    const d = camera.position.distanceTo(w.position);
                    if (d < cellSize/2) {
                        level++;
                        generateLevel();
                    }
                }
            });

            renderer.render(scene, camera);
        }

    </script>
</body>
</html>
