<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="description" content="A local movie collection manager. Add, search, and organize your films with JSON import/export.">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Local Movie Catalog (JSON)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Custom color palette */
        :root {
            --ocean-deep-900: #0a192f;
            --ocean-deep-800: #112240;
            --ocean-deep-700: #233554;
            --copper-600: #b9774e;
            --copper-700: #a16640;
            --copper-500: #d99066;
            --copper-400: #e6a885;
            --copper-300: #f2c0a3;
        }
        body {
            background-color: var(--ocean-deep-900);
            color: #e2e8f0; /* A light gray from Tailwind */
            font-family: sans-serif;
        }
        /* Applying custom colors with Tailwind classes */
        .bg-ocean-deep-900 { background-color: var(--ocean-deep-900); }
        .bg-ocean-deep-800 { background-color: var(--ocean-deep-800); }
        .bg-ocean-deep-700 { background-color: var(--ocean-deep-700); }
        .text-copper-300 { color: var(--copper-300); }
        .text-copper-400 { color: var(--copper-400); }
        .border-ocean-deep-700 { border-color: var(--ocean-deep-700); }
        .focus\:border-copper-500:focus { border-color: var(--copper-500); }
        .bg-copper-600 { background-color: var(--copper-600); }
        .hover\:bg-copper-700:hover { background-color: var(--copper-700); }
        .text-ocean-deep-700 { color: var(--ocean-deep-700); }

        /* Simple transition for page switching */
        .page {
            display: none;
            animation: fadeIn 0.5s;
        }
        .page.active {
            display: block;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
    </style>
</head>
<body class="p-4 sm:p-6 lg:p-8">

    <nav class="max-w-4xl mx-auto mb-8 flex justify-center items-center space-x-4 bg-ocean-deep-800 p-3 rounded-xl shadow-lg">
        <button id="nav-add" class="px-6 py-2 rounded-lg font-semibold transition-colors bg-copper-600 text-white">
            Add Movie
        </button>
        <button id="nav-view" class="px-6 py-2 rounded-lg font-semibold transition-colors text-copper-300 hover:bg-ocean-deep-700">
            View Collection
        </button>
    </nav>

    <main>
        <!-- Add Movie Page -->
        <div id="page-add" class="page active">
            <div class="max-w-lg mx-auto bg-ocean-deep-800 p-8 rounded-xl shadow-2xl">
                <h2 class="text-3xl font-bold text-copper-400 mb-6 text-center">Add a New Movie</h2>
                <div id="form-message" class="text-center mb-4 text-copper-300"></div>
                <form id="add-movie-form">
                    <div class="mb-4">
                        <label for="title" class="block text-copper-400 text-sm font-bold mb-2">Movie Title</label>
                        <input type="text" id="title" name="title" required class="w-full bg-ocean-deep-900 border-2 border-ocean-deep-700 rounded-lg py-2 px-3 text-gray-200 focus:outline-none focus:border-copper-500 transition-colors" placeholder="e.g., Blade Runner 2049">
                    </div>
                    <div class="mb-4">
                        <label for="barcode" class="block text-copper-400 text-sm font-bold mb-2">Barcode (UPC)</label>
                        <input type="text" id="barcode" name="barcode" class="w-full bg-ocean-deep-900 border-2 border-ocean-deep-700 rounded-lg py-2 px-3 text-gray-200 focus:outline-none focus:border-copper-500 transition-colors" placeholder="e.g., 883929592181">
                    </div>
                     <div class="mb-4">
                        <label for="releaseYear" class="block text-copper-400 text-sm font-bold mb-2">Release Year</label>
                        <input type="number" id="releaseYear" name="releaseYear" class="w-full bg-ocean-deep-900 border-2 border-ocean-deep-700 rounded-lg py-2 px-3 text-gray-200 focus:outline-none focus:border-copper-500 transition-colors" placeholder="e.g., 2017">
                    </div>
                    <div class="mb-4">
                        <label for="format" class="block text-copper-400 text-sm font-bold mb-2">Format</label>
                        <input type="text" id="format" name="format" required class="w-full bg-ocean-deep-900 border-2 border-ocean-deep-700 rounded-lg py-2 px-3 text-gray-200 focus:outline-none focus:border-copper-500 transition-colors" placeholder="e.g., 4K Blu-ray, DVD, Digital">
                    </div>
                    <div class="mb-6">
                        <label for="review" class="block text-copper-400 text-sm font-bold mb-2">Short Review</label>
                        <textarea id="review" name="review" class="w-full bg-ocean-deep-900 border-2 border-ocean-deep-700 rounded-lg py-2 px-3 text-gray-200 focus:outline-none focus:border-copper-500 transition-colors h-24 resize-none" placeholder="A brief summary or your thoughts..."></textarea>
                    </div>
                    <button type="submit" class="w-full bg-copper-600 hover:bg-copper-700 text-white font-bold py-3 px-4 rounded-lg focus:outline-none focus:shadow-outline transition-all transform hover:scale-105">
                        Add Movie to Collection
                    </button>
                </form>
            </div>
        </div>

        <!-- View Collection Page -->
        <div id="page-view" class="page">
            <div class="max-w-4xl mx-auto">
                <h2 class="text-3xl font-bold text-copper-400 mb-6 text-center">My Movie Collection</h2>

                <div class="flex flex-col sm:flex-row gap-4 mb-6">
                    <button id="import-btn" class="flex-1 bg-ocean-deep-700 hover:bg-ocean-deep-800 text-copper-300 font-bold py-2 px-4 rounded-lg transition-colors">Import from JSON File</button>
                    <button id="export-btn" class="flex-1 bg-copper-600 hover:bg-copper-700 text-white font-bold py-2 px-4 rounded-lg transition-colors">Export to JSON File</button>
                </div>

                <div class="mb-6">
                    <input type="text" id="search-bar" placeholder="Search by title..." class="w-full bg-ocean-deep-800 border-2 border-ocean-deep-700 rounded-lg py-2 px-4 text-gray-200 focus:outline-none focus:border-copper-500 transition-colors">
                </div>
                <div id="movie-list" class="space-y-4">
                    <!-- Movie items will be inserted here by JavaScript -->
                </div>
            </div>
        </div>
    </main>

    <footer class="text-center mt-12 text-sm text-ocean-deep-700">
        <p>Movie Catalog - Local JSON Version</p>
        <p class="mt-2 text-xs">Remember to export your collection to save a portable backup!</p>
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // --- CONSTANTS & STATE ---
            const STORAGE_KEY = 'movieCollection';
            let allMovies = [];

            // --- DOM ELEMENTS ---
            const navAdd = document.getElementById('nav-add');
            const navView = document.getElementById('nav-view');
            const pageAdd = document.getElementById('page-add');
            const pageView = document.getElementById('page-view');
            const addMovieForm = document.getElementById('add-movie-form');
            const formMessage = document.getElementById('form-message');
            const movieListContainer = document.getElementById('movie-list');
            const searchBar = document.getElementById('search-bar');
            const importBtn = document.getElementById('import-btn');
            const exportBtn = document.getElementById('export-btn');

            // --- DATA HANDLING ---

            // Load movies from localStorage on startup
            function loadMoviesFromStorage() {
                const storedMovies = localStorage.getItem(STORAGE_KEY);
                if (storedMovies) {
                    allMovies = JSON.parse(storedMovies);
                }
            }

            // Save movies to localStorage
            function saveMoviesToStorage() {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(allMovies));
            }

            // Render movies to the list
            function renderMovies(movies) {
                // Sort movies by title
                const sortedMovies = [...movies].sort((a, b) => a.title.toLowerCase().localeCompare(b.title.toLowerCase()));

                movieListContainer.innerHTML = ''; // Clear existing list
                if (sortedMovies.length === 0) {
                    movieListContainer.innerHTML = `<p class="text-center text-gray-400">Your collection is empty. Add a movie or import a collection.</p>`;
                    return;
                }
                sortedMovies.forEach(movie => {
                    const movieElement = document.createElement('div');
                    movieElement.className = 'bg-ocean-deep-800 p-5 rounded-xl shadow-lg transition-all duration-300';
                    movieElement.innerHTML = `
                        <div class="flex justify-between items-center cursor-pointer toggle-header">
                            <div>
                                <h3 class="text-xl font-bold text-copper-400">${movie.title} (${movie.releaseYear || 'N/A'})</h3>
                                <p class="text-copper-300">Format: ${movie.format}</p>
                            </div>
                            <svg class="w-6 h-6 text-copper-400 transform transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                        </div>
                        <div class="mt-4 pt-4 border-t border-ocean-deep-700 text-gray-300 space-y-2 hidden">
                            <p><strong>Barcode/UPC:</strong> ${movie.barcode || 'N/A'}</p>
                            <p><strong>Review:</strong> ${movie.review || 'No review added.'}</p>
                            <button class="delete-btn mt-3 px-4 py-1 bg-red-900 hover:bg-red-700 text-red-200 text-sm font-semibold rounded-lg transition-colors">Remove from Collection</button>
                        </div>
                    `;
                    // Toggle details view
                    movieElement.querySelector('.toggle-header').addEventListener('click', () => {
                        movieElement.querySelector('.toggle-header svg').classList.toggle('rotate-180');
                        movieElement.querySelector('.mt-4').classList.toggle('hidden');
                    });
                    // Delete movie
                    movieElement.querySelector('.delete-btn').addEventListener('click', (e) => {
                        e.stopPropagation();
                        allMovies = allMovies.filter(m => m.id !== movie.id);
                        saveMoviesToStorage();
                        renderMovies(allMovies);
                    });
                    movieListContainer.appendChild(movieElement);
                });
            }

            // --- NAVIGATION LOGIC ---
            function showPage(pageId) {
                document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
                document.getElementById(pageId).classList.add('active');

                navAdd.classList.toggle('bg-copper-600', pageId === 'page-add');
                navAdd.classList.toggle('text-white', pageId === 'page-add');
                navView.classList.toggle('bg-copper-600', pageId === 'page-view');
                navView.classList.toggle('text-white', pageId === 'page-view');

                if (pageId === 'page-view') {
                    renderMovies(allMovies);
                }
            }

            // --- EVENT LISTENERS ---
            navAdd.addEventListener('click', () => showPage('page-add'));
            navView.addEventListener('click', () => showPage('page-view'));

            addMovieForm.addEventListener('submit', (e) => {
                e.preventDefault();
                const formData = new FormData(addMovieForm);
                const movieData = {
                    id: Date.now(), // Simple unique ID
                    ...Object.fromEntries(formData.entries())
                };

                allMovies.push(movieData);
                saveMoviesToStorage();

                formMessage.textContent = 'Movie added successfully!';
                formMessage.style.color = 'var(--copper-300)';
                addMovieForm.reset();
                setTimeout(() => formMessage.textContent = '', 3000);
            });

            searchBar.addEventListener('input', (e) => {
                const searchTerm = e.target.value.toLowerCase();
                const filteredMovies = allMovies.filter(movie =>
                    movie.title.toLowerCase().includes(searchTerm)
                );
                renderMovies(filteredMovies);
            });

            exportBtn.addEventListener('click', () => {
                if (allMovies.length === 0) {
                    alert('Your collection is empty. There is nothing to export.');
                    return;
                }
                const jsonString = JSON.stringify(allMovies, null, 2);
                const blob = new Blob([jsonString], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'movies.json';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            });

            importBtn.addEventListener('click', () => {
                const input = document.createElement('input');
                input.type = 'file';
                input.accept = '.json,application/json';
                input.onchange = e => {
                    const file = e.target.files[0];
                    if (!file) return;

                    const reader = new FileReader();
                    reader.onload = event => {
                        try {
                            const importedMovies = JSON.parse(event.target.result);
                            // Basic validation
                            if (Array.isArray(importedMovies)) {
                                if (confirm('This will overwrite your current collection. Are you sure?')) {
                                    allMovies = importedMovies;
                                    saveMoviesToStorage();
                                    renderMovies(allMovies);
                                    alert(`Successfully imported ${allMovies.length} movies.`);
                                }
                            } else {
                                throw new Error('Invalid file format.');
                            }
                        } catch (err) {
                            alert('Error reading or parsing file. Please make sure it is a valid movie collection JSON file.');
                            console.error(err);
                        }
                    };
                    reader.readAsText(file);
                };
                input.click();
            });

            // --- INITIALIZATION ---
            loadMoviesFromStorage();
            showPage('page-add');
        });
    </script>
</body>
</html>
